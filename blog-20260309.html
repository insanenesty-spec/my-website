<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>민테스트를 위한 항목입니다. — 이태호</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --black:#111111; --mid:#555555; --light:#999999; --rule:#d8d8d8; --bg:#fafaf8; --serif-kr:'Nanum Myeongjo','Batang',serif; --serif-en:'Cormorant Garamond',Georgia,serif; --sans-kr:'Noto Sans KR',sans-serif; }
    html { font-size:16px; scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--black); font-family:var(--serif-kr); font-weight:400; line-height:1.85; -webkit-font-smoothing:antialiased; }
    header { border-bottom:1px solid var(--rule); padding:1.5rem 4vw; display:flex; justify-content:space-between; align-items:center; }
    .header-site { font-family:var(--serif-en); font-size:1rem; font-weight:300; letter-spacing:0.06em; color:var(--black); text-decoration:none; }
    .header-home { text-decoration:none; color:var(--light); font-family:var(--sans-kr); font-size:0.75rem; letter-spacing:0.12em; }
    .header-home:hover, .header-site:hover { color:var(--mid); }
    article { max-width:680px; margin:0 auto; padding:4rem 4vw 6rem; }
    .post-meta { font-family:var(--sans-kr); font-size:0.68rem; letter-spacing:0.15em; color:var(--light); margin-bottom:1.2rem; }
    h1 { font-family:var(--serif-kr); font-weight:700; font-size:clamp(1.6rem,3.5vw,2.2rem); line-height:1.4; margin-bottom:3rem; border-bottom:1px solid var(--rule); padding-bottom:2rem; }
    .post-body p { font-size:1rem; line-height:2.1; margin-bottom:1.8rem; color:#222; }
    .post-body h2 { font-family:var(--serif-kr); font-weight:700; font-size:1.15rem; margin:3rem 0 1rem; }
    .post-body blockquote { border-left:2px solid var(--rule); padding-left:1.4rem; color:var(--mid); font-style:italic; margin:2rem 0; line-height:2; }
    .post-body hr { border:none; border-top:1px solid var(--rule); margin:2.5rem 0; }
    .post-body strong { font-weight:700; }
    .post-body em { font-style:italic; }
    footer { border-top:1px solid var(--rule); padding:2rem 4vw; text-align:center; font-family:var(--sans-kr); font-size:0.72rem; color:var(--light); }
    footer a { color:var(--light); text-decoration:none; }
    footer a:hover { color:var(--black); }
  </style>
</head>
<body>
  <header>
    <a class="header-site" href="index.html">이태호</a>
    <a class="header-home" href="index.html">← 홈으로</a>
  </header>
  <article>
    <p class="post-meta">2026. 03. 09 &nbsp;·&nbsp; 법률</p>
    <h1>민테스트를 위한 항목입니다.</h1>
    <div class="post-body">
<p>그것은 민경일이라고 하기에는 너무나도 컸다 왜냐하명 투명드래곤이었기 때문이다</p>
<h2>투명드래곤은 너무 나 크다</h2>
<p>왜냐하면 투명드래곤은 투명하기때문이다</p>
<blockquote>투명한것은 보이지 않는 다는 것</blockquote>
<hr />
<p>그렇다면 우리의 미래는</p>
    </div>
  </article>
  <footer><a href="index.html">← 홈으로 돌아가기</a></footer>
</body>
</html>
